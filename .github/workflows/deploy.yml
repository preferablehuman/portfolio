name: Deploy portfolio to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build portfolio
        run: npm run build

      - name: Add SPA route fallback
        run: cp dist/index.html dist/404.html

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Upload production build
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./dist

      # The repository is currently also configured for GitHub's legacy
      # branch-based Pages build. Let that deployment finish first so this
      # Vite artifact is always the final deployment for the commit.
      - name: Wait for legacy Pages deployment
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          sleep 10

          for attempt in {1..30}; do
            active_runs="$(
              gh api "repos/${GITHUB_REPOSITORY}/actions/runs?head_sha=${GITHUB_SHA}&per_page=100" \
                --jq '[.workflow_runs[] | select((.name == "pages build and deployment" or .name == "pages-build-deployment") and (.status == "queued" or .status == "in_progress" or .status == "waiting" or .status == "pending"))] | length'
            )"

            if [ "$active_runs" -eq 0 ]; then
              echo "No legacy Pages deployment is still running."
              break
            fi

            echo "Waiting for $active_runs legacy Pages deployment(s) to finish..."
            sleep 5
          done

          if [ "$active_runs" -ne 0 ]; then
            echo "::error::Legacy Pages deployment did not finish before the timeout."
            exit 1
          fi

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

      - name: Verify deployed Vite site
        env:
          SITE_URL: ${{ steps.deployment.outputs.page_url }}
        run: |
          for attempt in {1..12}; do
            html="$(curl --fail --silent --show-error "${SITE_URL}?sha=${GITHUB_SHA}&attempt=${attempt}")"

            if echo "$html" | grep --quiet "/portfolio/assets/" &&
              ! echo "$html" | grep --quiet "/src/main.tsx"; then
              echo "GitHub Pages is serving the Vite production build."
              exit 0
            fi

            echo "Waiting for the production artifact to reach GitHub Pages..."
            sleep 10
          done

          echo "::error::GitHub Pages is not serving the Vite production artifact."
          exit 1
